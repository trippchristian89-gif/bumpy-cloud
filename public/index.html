<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BUMPY</title>

  <!-- Leaflet -->
  <link rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <meta name="apple-mobile-web-app-title" content="BUMPY">
  <meta name="application-name" content="BUMPY">

  <style>
    /* Nur Layout-Anpassung */
    .panel {
      display: flex;
      flex-direction: column;
      gap: 6px; /* gleicher Abstand überall */
    }

    .hero-image {
      margin-top: 6px;
      margin-bottom: 8px;
    }

    .hero-image img {
      width: 100%;
      border-radius: 12px;
      display: block;
    }

    .hero-image-2 {
      margin-top: 6px;      /* Abstand darüber */
      margin-bottom: 8px;   /* Abstand darunter */
    }
    
    .hero-image-2 img {
      width: 100%;
      border-radius: 12px;
      display: block;
    }

    /* Locate Button in der Map */
    .locate-btn {
      width: 36px;
      height: 36px;
      background: white;
      border: 2px solid rgba(0,0,0,0.2);
      border-radius: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      padding: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: background 0.15s;
    }

    .locate-btn:hover {
      background: #f0f0f0;
    }

  </style>
</head>

<body>

  <div class="panel">

    <!-- 🔥 Bild jetzt ganz oben -->
    <div class="hero-image">
      <img src="/camper.png" alt="Bumpy Camper">
    </div>

    <div class="box footer">
      <div class="row footer-row">
        <span class="bumpy-text">BUMPY status</span>
        <span id="connection_status" class="status offline">offline</span>
      </div>
    </div>

    <div class="box">
      <div class="row">
        <span>Temp Camper:</span>
        <span id="temp_bumpy" class="temp">--.- °C</span>
      </div>
    </div>

    <div class="box">
      <div class="row">
        <span>Floor Heating:</span>
        <span id="floor_state">OFF</span>
      </div>
      <div class="row small">
        <span id="floor_timer">--:--</span>
        <span>(<span id="floor_timer_total">--:--</span>)</span>
      </div>
    </div>

    <div class="controls">
      <button id="btn_floor_start">Start</button>
      <button id="btn_floor_stop">Stop</button>
    </div>

    <div class="box">
      <div class="row">
        <span>Air Heater:</span>
        <span id="heater_state">OFF</span>
      </div>

      <div class="row">
        <span>Temp Air:</span>
        <span id="temp_air" class="temp">--.- °C</span>
      </div>

      <hr />
      <div class="info" id="heater_info"></div>
    </div>

    <div class="controls">
      <button id="btn_start">Start</button>
      <button id="btn_stop">Stop</button>
    </div>
    
    <!-- 🔥 Zweites Bild über der Map -->
    <div class="hero-image-2">
      <img src="/camper2.png" alt="Bumpy Camper 2">
    </div>

    <div class="box">
      <div id="map" style="height: 280px; border-radius: 12px;"></div>
    </div>

  </div>

  <script src="/app.js"></script>
</body>

</html>
